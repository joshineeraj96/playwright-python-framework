name: CI Pipeline

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

  push:
    branches:
      - main
      - develop
      - bug_fix
      - release/*

  workflow_dispatch:

env:
  PYTHON_VERSION: "3.12"

jobs:

  test-environment-setup:
    name: Test Environment Setup
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      ORANGEHRM_USERNAME: ${{ secrets.ORANGEHRM_USERNAME }}
      ORANGEHRM_PASSWORD: ${{ secrets.ORANGEHRM_PASSWORD }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Verify Python
        run: python --version

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Verify Pytest
        run: pytest --version

      - name: Install Playwright Browsers
        run: playwright install --with-deps

      - name: Verify Playwright
        run: playwright --version

      - name: Install Allure CLI
        run: |
          wget https://github.com/allure-framework/allure2/releases/latest/download/allure-2.34.1.tgz
          tar -zxvf allure-2.34.1.tgz
          sudo mv allure-2.34.1 /opt/allure
          sudo ln -s /opt/allure/bin/allure /usr/bin/allure

      - name: Verify Allure
        run: allure --version

  collect-tests:
    name: Collect Tests
    if: github.event_name == 'pull_request'
    needs: test-environment-setup
    runs-on: ubuntu-latest
    timeout-minutes: 5

    env:
      ORANGEHRM_USERNAME: ${{ secrets.ORANGEHRM_USERNAME }}
      ORANGEHRM_PASSWORD: ${{ secrets.ORANGEHRM_PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - run: pip install -r requirements.txt
      - run: playwright install --with-deps

      - name: Collect Tests
        run: pytest --collect-only

  execute-ui-tests:
    name: Execute UI Tests
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    needs:
      - test-environment-setup
      - collect-tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      ORANGEHRM_USERNAME: ${{ secrets.ORANGEHRM_USERNAME }}
      ORANGEHRM_PASSWORD: ${{ secrets.ORANGEHRM_PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - run: pip install -r requirements.txt
      - run: playwright install --with-deps

      - name: Execute Tests
        run: pytest --alluredir=artifacts/allure-results

      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: artifacts/allure-results
          if-no-files-found: ignore

      - name: Upload Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: artifacts/screenshots
          if-no-files-found: ignore

      - name: Upload Traces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: traces
          path: artifacts/traces
          if-no-files-found: ignore

  publish-allure-report:
    name: Publish Allure Report
    if: github.event_name == 'workflow_dispatch'
    needs: execute-ui-tests
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: allure-results
          path: artifacts/allure-results

      - name: Install Allure CLI
        run: |
          wget https://github.com/allure-framework/allure2/releases/latest/download/allure-2.34.1.tgz
          tar -zxvf allure-2.34.1.tgz
          sudo mv allure-2.34.1 /opt/allure
          sudo ln -s /opt/allure/bin/allure /usr/bin/allure

      - name: Generate Allure Report
        run: |
          allure generate artifacts/allure-results --clean -o artifacts/allure-report

      - name: Upload Allure HTML Report
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: artifacts/allure-report