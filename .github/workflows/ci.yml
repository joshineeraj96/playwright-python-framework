name: CI Pipeline

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

  push:
    branches:
      - main
      - develop
      - bug_fix
      - release/*

  workflow_dispatch:

env:
  PYTHON_VERSION: "3.12"  

jobs:
  ui-tests:
    name: UI Test Validation
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Verify Python Version
        run: python --version

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Verify Pytest Installation
        run: pytest --version

      - name: Install Playwright Browsers
        run: playwright install --with-deps

      - name: Verify Playwright Installation
        run: playwright --version

      - name: Install Allure CLI
        run: |
          wget https://github.com/allure-framework/allure2/releases/download/2.34.1/allure-2.34.1.tgz
          tar -zxvf allure-2.34.1.tgz
          sudo mv allure-2.34.1 /opt/allure
          sudo ln -s /opt/allure/bin/allure /usr/bin/allure

      - name: Verify Allure Installation
        run: allure --version

      - name: Run Tests
        run: pytest --alluredir=artifacts/allure-results

      - name: Generate Allure Report
        if: always()
        run: |
          allure generate artifacts/allure-results --clean -o artifacts/allure-report

      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: artifacts/allure-results
          if-no-files-found: ignore

      - name: Upload Allure HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: artifacts/allure-report
          if-no-files-found: ignore

      - name: Upload Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: artifacts/screenshots
          if-no-files-found: ignore

      - name: Upload Traces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: traces
          path: artifacts/traces
          if-no-files-found: ignore